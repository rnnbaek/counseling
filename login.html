<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 · 상담 아카이브</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">🌿</div>
      <h1>상담 아카이브</h1>
      <p>상담사의 성장을 기록하는 공간</p>
    </div>

    <div class="login-error" id="login-error"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label">이메일</label>
        <input type="email" id="email" class="form-input" placeholder="이메일 주소" required autofocus />
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <input type="password" id="password" class="form-input" placeholder="비밀번호" required />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:0.5rem;" id="login-btn">
        로그인
      </button>
    </form>

    <div style="text-align:center; margin-top:1.5rem;">
      <a href="index.html" style="font-size:0.82rem; color:var(--text-light);">← 메인으로 돌아가기</a>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
(async () => {
  // If already logged in, redirect
  const session = await getSession();
  if (session) window.location.href = 'sessions.html';
})();

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const errorEl = document.getElementById('login-error');

  btn.textContent = '로그인 중...';
  btn.disabled = true;
  errorEl.style.display = 'none';

  const { error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    errorEl.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
    errorEl.style.display = 'block';
    btn.textContent = '로그인';
    btn.disabled = false;
  } else {
    window.location.href = 'sessions.html';
  }
});
</script>
</body>
</html>
